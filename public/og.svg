<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#09090b"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#27272a" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.4"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo icon -->
  <rect x="80" y="80" width="56" height="56" rx="14" fill="#6366f1"/>
  <path d="M94 101h18a10 10 0 0 1 0 20H94v-20z" fill="white"/>
  <rect x="94" y="108" width="14" height="6" rx="1.5" fill="#6366f1"/>

  <!-- Title -->
  <text x="80" y="240" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="72" fill="#fafafa" letter-spacing="-2">CommerceForge</text>

  <!-- Subtitle -->
  <text x="80" y="310" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="32" fill="#a1a1aa">The Hydrogen starter agencies actually ship with.</text>

  <!-- Tags -->
  <rect x="80" y="370" width="200" height="40" rx="20" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
  <text x="180" y="396" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#a1a1aa" text-anchor="middle">Shopify Hydrogen</text>

  <rect x="296" y="370" width="140" height="40" rx="20" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
  <text x="366" y="396" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#a1a1aa" text-anchor="middle">shadcn/ui</text>

  <rect x="452" y="370" width="120" height="40" rx="20" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
  <text x="512" y="396" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#a1a1aa" text-anchor="middle">B2C + B2B</text>

  <rect x="588" y="370" width="130" height="40" rx="20" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
  <text x="653" y="396" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#a1a1aa" text-anchor="middle">17 locales</text>

  <!-- Price -->
  <text x="80" y="520" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="28" fill="#6366f1">From 199 € · commerceforge.dev</text>
</svg>
